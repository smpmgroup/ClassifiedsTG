events { worker_connections 1024; }
http {
  gzip on; gzip_types text/css application/javascript application/json image/svg+xml;
  limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
  upstream api { server backend:3001; } upstream web { server frontend:80; }
  server {
    listen 8080; server_name _; client_max_body_size 12m;
    add_header X-Content-Type-Options nosniff always; add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self)" always;
    location /api/ { limit_req zone=api burst=40 nodelay; proxy_pass http://api; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Forwarded-Proto $scheme; proxy_set_header X-Request-ID $request_id; }
    location /uploads/ { proxy_pass http://api; }
    location = /health { proxy_pass http://api/health; }
    location / { proxy_pass http://web; proxy_set_header Host $host; }
    location ~ /\.(?!well-known) { deny all; }
  }
}
