server { listen 80; server_name _; root /usr/share/nginx/html; location / { try_files $uri /index.html; } location = /health { access_log off; return 200 'ok'; add_header Content-Type text/plain; } location ~* \.(js|css|png|webp|svg|woff2)$ { expires 1y; add_header Cache-Control "public, immutable"; } }
